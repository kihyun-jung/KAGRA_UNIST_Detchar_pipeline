[DEFAULT]
ifo = K1

[hveto]
snr-thresholds = 7.75, 8.00, 8.50, 9.00, 10.00
time-windows = 0.10, 0.20, 0.40
minimum-significance = 5.0

[segments]
# 데모 환경에서는 온라인 세그먼트 서버 접속을 막습니다.
# url = https://segments.ligo.org
padding = 0, -10

[primary]
channel = %(IFO)s:CAL-CS_PROC_DARM_STRAIN_DBL_DQ
trigger-generator = Omicron
snr-threshold = 8.0
frequency-range = 10,1000
read-format = ligolw
read-tablename = sngl_burst
read-columns = peak, peak_frequency, snr

[auxiliary]
trigger-generator = Omicron
frequency-range = 8,1000
read-format = ligolw
read-tablename = sngl_burst
read-columns = peak, peak_frequency, snr
# 보안상 실제 채널 목록 대신 Mock Channel이 자동 주입됩니다.
channels = 
{AUX_CHANNELS}

[safety]
unsafe-channels = K1:CAL-CS_PROC_DARM_STRAIN_DBL_DQ
